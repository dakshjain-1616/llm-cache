<svg width="760" height="340" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <linearGradient id="gradPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gradTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="gradSlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="340" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect width="760" height="50" rx="16" fill="#f8fafc"/>
  <rect y="34" width="760" height="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#0f172a">llm-cache — Component Architecture</text>

  <!-- ── LAYER 1: Your Application ── -->
  <rect x="240" y="62" width="280" height="44" rx="10" fill="url(#gradPurple)" filter="url(#cardShadow)"/>
  <text x="380" y="80" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" fill="white">Your Application</text>
  <text x="380" y="97" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#e9d5ff">openai · anthropic · custom</text>

  <!-- Arrow 1→2 -->
  <line x1="380" y1="107" x2="380" y2="123" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowDown)"/>

  <!-- ── LAYER 2: Wrappers (split into two) ── -->
  <rect x="100" y="125" width="238" height="50" rx="10" fill="url(#gradBlue)" filter="url(#cardShadow)"/>
  <text x="219" y="143" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="700" fill="white">CachedOpenAI</text>
  <text x="219" y="159" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9.5" fill="#bfdbfe">chat.completions.create() · async</text>

  <rect x="422" y="125" width="238" height="50" rx="10" fill="url(#gradBlue)" filter="url(#cardShadow)"/>
  <text x="541" y="143" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="700" fill="white">CachedAnthropic</text>
  <text x="541" y="159" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9.5" fill="#bfdbfe">messages.create() · async</text>

  <!-- Lines from app to wrappers -->
  <line x1="330" y1="107" x2="219" y2="124" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="430" y1="107" x2="541" y2="124" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Arrow 2→3 (both wrappers converge) -->
  <line x1="219" y1="176" x2="340" y2="196" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="541" y1="176" x2="420" y2="196" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ── LAYER 3: SemanticCache ── -->
  <rect x="240" y="198" width="280" height="50" rx="10" fill="url(#gradTeal)" filter="url(#cardShadow)"/>
  <text x="380" y="217" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" fill="white">SemanticCache</text>
  <text x="380" y="234" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9.5" fill="#d1fae5">get · set · lookup_or_call · stats · clear</text>

  <!-- Arrow 3→4 split -->
  <line x1="310" y1="249" x2="220" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="450" y1="249" x2="540" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ── LAYER 4a: Embedder ── -->
  <rect x="100" y="270" width="238" height="50" rx="10" fill="url(#gradSlate)" filter="url(#cardShadow)"/>
  <text x="219" y="289" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="700" fill="white">Embedder</text>
  <text x="219" y="306" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9.5" fill="#e2e8f0">all-MiniLM-L6-v2 · 384-dim · local</text>

  <!-- ── LAYER 4b: CacheStore + FAISS ── -->
  <rect x="422" y="270" width="238" height="50" rx="10" fill="url(#gradSlate)" filter="url(#cardShadow)"/>
  <text x="541" y="289" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="700" fill="white">CacheStore + FAISS</text>
  <text x="541" y="306" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9.5" fill="#e2e8f0">IndexFlatIP · cosine · persist to disk</text>

  <!-- Real API box (right side, separate) -->
  <rect x="630" y="198" width="108" height="50" rx="10" fill="url(#gradOrange)" filter="url(#cardShadow)"/>
  <text x="684" y="218" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="700" fill="white">Real LLM API</text>
  <text x="684" y="234" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" fill="#fed7aa">on cache miss only</text>

  <!-- Arrow SemanticCache → Real API (cache miss path) -->
  <line x1="521" y1="223" x2="629" y2="223" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowRight)"/>
  <text x="575" y="215" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" fill="#f97316">miss</text>

  <!-- Legend row -->
  <rect x="22" y="322" width="10" height="10" rx="2" fill="url(#gradPurple)"/>
  <text x="37" y="331" font-family="system-ui,sans-serif" font-size="9.5" fill="#475569">App layer</text>
  <rect x="115" y="322" width="10" height="10" rx="2" fill="url(#gradBlue)"/>
  <text x="130" y="331" font-family="system-ui,sans-serif" font-size="9.5" fill="#475569">SDK wrappers</text>
  <rect x="225" y="322" width="10" height="10" rx="2" fill="url(#gradTeal)"/>
  <text x="240" y="331" font-family="system-ui,sans-serif" font-size="9.5" fill="#475569">Cache core</text>
  <rect x="320" y="322" width="10" height="10" rx="2" fill="url(#gradSlate)"/>
  <text x="335" y="331" font-family="system-ui,sans-serif" font-size="9.5" fill="#475569">Local infrastructure</text>
  <rect x="455" y="322" width="10" height="10" rx="2" fill="url(#gradOrange)"/>
  <text x="470" y="331" font-family="system-ui,sans-serif" font-size="9.5" fill="#475569">External API (bypassed on cache hit)</text>
</svg>
